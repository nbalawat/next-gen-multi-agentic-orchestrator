phase: deploy
activities:
  - id: deployment-config
    name: Deployment Configuration
    description: Create deployment configurations, CI/CD pipelines, and infrastructure-as-code
    when: {required: true}
    inputs:
      - {name: solution-design, type: markdown, source: previous_phase}
      - {name: source-code, type: code, source: previous_phase}
    outputs:
      - {name: deploy-config, type: config, file: deployment-config.md}
    agent: rapids-lead
    model: sonnet
    gate: true

  - id: staging-deploy
    name: Staging Deployment
    description: Deploy to staging environment for pre-production verification
    when: {min_tier: 3}
    depends_on: [deployment-config]
    inputs:
      - {name: deploy-config, type: config, from: deployment-config}
    outputs:
      - {name: staging-result, type: markdown, file: staging-deploy-result.md}
    agent: rapids-lead
    model: sonnet
    gate: true

  - id: smoke-testing
    name: Smoke Testing
    description: Run smoke tests against staging to verify core functionality
    when: {required: true}
    depends_on: [staging-deploy]
    inputs:
      - {name: staging-result, type: markdown, from: staging-deploy}
    outputs:
      - {name: smoke-results, type: markdown, file: smoke-test-results.md}
    agent: rapids-lead
    model: sonnet
    gate: true

  - id: production-deploy
    name: Production Deployment
    description: Deploy to production after staging verification passes
    when: {min_tier: 3}
    depends_on: [smoke-testing]
    inputs:
      - {name: smoke-results, type: markdown, from: smoke-testing}
    outputs:
      - {name: production-result, type: markdown, file: production-deploy-result.md}
    agent: rapids-lead
    model: sonnet
    gate: true
