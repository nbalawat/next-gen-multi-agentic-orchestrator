name: RAPIDS Framework CI

on: [pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: F1 - Pure logic tests
        run: pytest tests/framework/test_*.py -v --tb=short

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: sudo apt-get install -y jq
      - name: F2 - Hook integration tests
        run: bash tests/framework/hooks/run_all_hook_tests.sh

  replay-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: F3 - Recorded replay tests
        run: pytest tests/framework/test_replay.py -v --tb=short

  llm-smoke:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'touches-prompts')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,smoke]"
      - name: F4 - LLM smoke tests
        run: pytest tests/framework/smoke/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
