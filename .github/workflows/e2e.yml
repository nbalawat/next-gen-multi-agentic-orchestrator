name: RAPIDS Framework E2E

on:
  schedule:
    - cron: '0 2 * * 0'  # Sundays at 2 AM
  workflow_dispatch:
    inputs:
      scenario:
        description: 'E2E scenario to run'
        default: 'tier2-todo-enhancement'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build test runner image
        run: docker build -t rapids-test-runner:latest -f tests/framework/e2e/Dockerfile .
      - name: Run E2E scenario
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            -e E2E_BUDGET_CAP=5.00 \
            -e E2E_TIMEOUT=30m \
            -v /tmp/rapids-e2e-results:/results \
            rapids-test-runner:latest \
            ${{ github.event.inputs.scenario || 'tier2-todo-enhancement' }}
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: /tmp/rapids-e2e-results/
